<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritik ❤️ Palak</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #ff512f, #dd2476);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

header {
    padding: 30px 15px;
}

header h1 {
    font-size: 28px;
    margin-bottom: 5px;
}

header p {
    font-size: 14px;
}

/* Love Story Cards */
.timeline {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    margin: 25px 10px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-top: 10px;
}

.card h3 {
    margin-bottom: 10px;
}

/* Button */
button {
    margin: 30px 0 50px 0;
    padding: 14px 30px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    background: white;
    color: #dd2476;
    cursor: pointer;
    font-weight: bold;
}

/* Holi Splash Animation */
.splash {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from {
        transform: scale(0);
        opacity: 1;
    }
    to {
        transform: scale(4);
        opacity: 0;
    }
}
</style>
</head>

<body>

<header>
    <h1>Palak ❤️</h1>
    <p>This page is only for you 💌</p>
    <p>Forever yours, Ritik 💍</p>
</header>

<div class="timeline">

    <div class="card">
        <h3>🌸 The Beginning</h3>
        <p>The day I met you, my world became brighter.</p>
        <img src="palak1.jpg">
    </div>

    <div class="card">
        <h3>🌈 Our Holi</h3>
        <p>Every color feels special when I celebrate it with you.</p>
        <img src="palak2.jpg">
    </div>

    <div class="card">
        <h3>💖 Forever</h3>
        <p>I promise to stay with you in every phase of life.</p>
        <img src="palak3.jpg">
    </div>

</div>

<button onclick="finalMessage()">Final Surprise 💍</button>

<script>
function finalMessage() {
    alert("Palak ❤️ I want to celebrate every Holi of life with you. I Love You Forever 💍");
}

/* Holi Color Splash Effect */
document.addEventListener("click", function(e) {
    let colors = ["#ff4d6d", "#ffcc00", "#00c3ff", "#9d4edd", "#00ff88"];
    let splash = document.createElement("div");
    splash.classList.add("splash");

    let size = Math.random() * 100 + 50;
    splash.style.width = size + "px";
    splash.style.height = size + "px";
    splash.style.left = e.clientX - size/2 + "px";
    splash.style.top = e.clientY - size/2 + "px";
    splash.style.background = colors[Math.floor(Math.random()*colors.length)];

    document.body.appendChild(splash);

    setTimeout(() => {
        splash.remove();
    }, 1000);
});
</script>

</body>
</html>
